<svg xmlns="http://www.w3.org/2000/svg" width="720" height="1080" viewBox="0 0 720 1080" role="img" aria-labelledby="title description">
<title id="title">Luqman Zahid Abdurrokhman - Full-Stack Builder</title>
<desc id="description">A builder profile card with Luqman's high-contrast ASCII portrait, product focus, and selected work.</desc>
<defs>
  <linearGradient id="background" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#F7F1E8"/><stop offset="1" stop-color="#EEE2D4"/></linearGradient>
  <linearGradient id="ascii-signal" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#A9431F"/><stop offset="1" stop-color="#8A6848"/></linearGradient>
  <linearGradient id="border" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#8A6848"/><stop offset="0.48" stop-color="#A9431F"/><stop offset="1" stop-color="#56715A"/></linearGradient>
  <linearGradient id="scan" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#A9431F" stop-opacity="0"/><stop offset="0.5" stop-color="#A9431F" stop-opacity="0.46"/><stop offset="1" stop-color="#8A6848" stop-opacity="0"/></linearGradient>
  <radialGradient id="portrait-halo"><stop offset="0" stop-color="#A9431F" stop-opacity="0.12"/><stop offset="0.48" stop-color="#C66B43" stop-opacity="0.055"/><stop offset="1" stop-color="#8A6848" stop-opacity="0"/></radialGradient>
  <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse"><rect width="4" height="1" fill="#A9431F" opacity="0.052"/></pattern>
  <pattern id="portrait-grid" width="44" height="44" patternUnits="userSpaceOnUse"><path d="M 44 0 H 0 V 44" fill="none" stroke="#C66B43" stroke-width="0.65" opacity="0.085"/><circle cx="0" cy="0" r="1.2" fill="#A9431F" opacity="0.13"/></pattern>
  <clipPath id="portrait-clip"><rect x="58" y="122" width="604" height="312" rx="12"/></clipPath>
  <style>
    .mono { font-family: 'Courier New', Consolas, monospace; }
    .ascii { font-family: 'Courier New', Consolas, monospace; font-size: 6.6px; letter-spacing: -0.15px; fill: url(#ascii-signal); }
    .panel-title { font-family: 'Courier New', Consolas, monospace; font-size: 12px; letter-spacing: 2px; fill: #C66B43; opacity: 0.78; }
    .terminal-label { font-family: 'Courier New', Consolas, monospace; font-size: 11px; letter-spacing: 0.5px; fill: #75675C; }
    .live-label { font-family: 'Courier New', Consolas, monospace; font-size: 9px; letter-spacing: 1px; fill: #A9431F; }
    .system-head { font-family: 'Courier New', Consolas, monospace; font-size: 15px; font-weight: 700; }
    .system-section, .system-footer, .system-row { font-family: 'Courier New', Consolas, monospace; font-size: 13px; }
    .system-section, .system-key { font-weight: 700; }
    text, tspan { white-space: pre; }
    .motion-orbit { transform-box: view-box; }
    @keyframes orbit-forward { to { transform: rotate(360deg); } }
    @keyframes orbit-backward { to { transform: rotate(-360deg); } }
    @keyframes scan-sweep { from { transform: translateY(0); } to { transform: translateY(1220px); } }
    @media (prefers-reduced-motion: no-preference) {
      .motion-orbit--forward { animation: orbit-forward 42s linear infinite; }
      .motion-orbit--backward { animation: orbit-backward 34s linear infinite; }
      .motion-scan { animation: scan-sweep 8s linear infinite; }
    }
    @media (prefers-reduced-motion: reduce) {
      .motion-scan { display: none; }
    }
  </style>
</defs>
